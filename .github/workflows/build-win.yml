name: Build Windows App

# Se déclenche automatiquement à chaque push sur main/master,
# ou manuellement depuis l'onglet "Actions" de GitHub
on:
  push:
    branches: [ main, master ]
    paths:
      - "azeroth_launcher_win.py"
      - "icon.ico"
      - ".github/workflows/build-win.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation de PyInstaller
        run: pip install pyinstaller

      # Le launcher est une application graphique (Tkinter) : on utilise
      # --windowed pour ne pas ouvrir de console noire derrière la fenêtre.
      - name: Build avec icône
        if: hashFiles('icon.ico') != ''
        run: |
          pyinstaller --onefile --windowed `
            --name "AzerothLauncher" `
            --icon=icon.ico `
            azeroth_launcher_win.py

      - name: Build sans icône (si icon.ico absent)
        if: hashFiles('icon.ico') == ''
        run: |
          pyinstaller --onefile --windowed `
            --name "AzerothLauncher" `
            azeroth_launcher_win.py

      - name: Publication du binaire compilé
        uses: actions/upload-artifact@v4
        with:
          name: AzerothLauncher-Windows
          path: dist/AzerothLauncher.exe
          if-no-files-found: error
