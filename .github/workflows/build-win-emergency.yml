name: Build Windows App (Urgence)

# Se déclenche automatiquement à chaque push sur main/master,
# ou manuellement depuis l'onglet "Actions" de GitHub
on:
  push:
    branches: [ main, master ]
    paths:
      - "azeroth_launcher_emergency.py"
      - "icon.ico"
      - "UnRAR.exe"
      - ".github/workflows/build-win-emergency.yml"
  workflow_dispatch:

jobs:
  build-windows-emergency:
    runs-on: windows-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation de PyInstaller
        run: pip install pyinstaller

      # Le launcher est une application graphique (Tkinter) : on utilise
      # --windowed pour ne pas ouvrir de console noire derrière la fenêtre.
      #
      # Si UnRAR.exe est présent à la racine du dépôt, il est embarqué
      # dans l'exécutable (--add-binary) : au premier lancement, le
      # launcher le retrouve automatiquement dans son dossier temporaire
      # d'extraction (voir find_unrar_exe dans le script), sans que
      # l'utilisateur ait besoin d'installer WinRAR séparément.
      # Téléchargement d'UnRAR.exe (freeware, redistribuable) :
      #   https://www.rarlab.com/rar_add.htm
      - name: Build
        shell: pwsh
        run: |
          $pyArgs = @(
            "--onefile",
            "--windowed",
            "--name", "AzerothLauncherUrgence"
          )
          if (Test-Path "icon.ico") {
            $pyArgs += "--icon=icon.ico"
            Write-Host "Icône trouvée : icon.ico"
          } else {
            Write-Host "Aucune icône trouvée, build sans icône."
          }
          if (Test-Path "UnRAR.exe") {
            $pyArgs += "--add-binary"
            $pyArgs += "UnRAR.exe;."
            Write-Host "UnRAR.exe trouvé : sera embarqué dans l'exécutable."
          } else {
            Write-Host "UnRAR.exe absent du dépôt : l'utilisateur devra l'installer séparément (WinRAR) ou le placer à côté du launcher."
          }
          $pyArgs += "azeroth_launcher_emergency.py"

          pyinstaller @pyArgs

      - name: Publication du binaire compilé
        uses: actions/upload-artifact@v4
        with:
          name: AzerothLauncherUrgence-Windows
          path: dist/AzerothLauncherUrgence.exe
          if-no-files-found: error
